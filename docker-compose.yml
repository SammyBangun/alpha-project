services:
  db:
    image: postgres:17
    container_name: alpha-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: alpha
      POSTGRES_PASSWORD: alpha
      POSTGRES_DB: project_alpha
    ports:
      - "5433:5432"
    volumes:
      - alpha-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alpha -d project_alpha"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  alpha-pgdata:
